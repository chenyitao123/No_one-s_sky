<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无人深空：星海编年史与PCG创世</title>
  
  <!-- 引入 Tailwind CSS 进行样式渲染 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 用于在浏览器中解析 JSX 语法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 基础动画保持不变 */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 4s linear infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(1.5deg); }
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float-delayed {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(12px) rotate(-1deg); }
    }
    .animate-float-delayed {
      animation: float-delayed 8s ease-in-out infinite;
    }

    /* 电影级文字快闪特效 */
    @keyframes cinematic-zoom-long {
      0% { transform: scale(0.95); opacity: 0; filter: blur(10px); }
      10% { opacity: 1; filter: blur(0px); }
      90% { opacity: 1; filter: blur(0px); }
      100% { transform: scale(1.05); opacity: 0; filter: blur(10px); }
    }
    .animate-cinematic-long {
      animation: cinematic-zoom-long 4s ease-in-out forwards;
    }

    @keyframes cinematic-zoom {
      0% { transform: scale(0.95); opacity: 0; filter: blur(10px); }
      15% { opacity: 1; filter: blur(0px); }
      85% { opacity: 1; filter: blur(0px); }
      100% { transform: scale(1.05); opacity: 0; filter: blur(10px); }
    }
    .animate-cinematic {
      animation: cinematic-zoom 4s ease-in-out forwards;
    }
    
    @keyframes text-reveal {
      0% { opacity: 0; transform: translateY(20px); filter: blur(5px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    .animate-reveal {
      animation: text-reveal 1s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 1.5s ease-out forwards;
    }

    @keyframes code-scroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
    .animate-code-scroll {
      animation: code-scroll 1.5s linear infinite;
    }

    @keyframes warp-lines {
      0% { transform: translateY(-100%); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(200%); opacity: 0; }
    }
    .animate-warp-lines {
      animation: warp-lines 1.5s linear infinite;
    }
    @keyframes accumulate-bar {
      0% { width: 5%; background-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
      50% { width: 50%; background-color: #eab308; box-shadow: 0 0 15px #eab308; }
      100% { width: 100%; background-color: #a855f7; box-shadow: 0 0 20px #a855f7; }
    }
    .animate-accumulate-bar {
      animation: accumulate-bar 3s ease-in-out infinite alternate;
    }
    
    @keyframes ship-approach {
      0% { transform: translate(-200px, 100px) scale(0.5); opacity: 0; }
      20% { opacity: 1; }
      50% { transform: translate(-40px, 20px) scale(1); opacity: 1; }
      80% { transform: translate(-40px, 20px) scale(1); opacity: 1; }
      100% { transform: translate(200px, -100px) scale(0.5); opacity: 0; }
    }
    .animate-ship-approach {
      animation: ship-approach 8s ease-in-out forwards;
    }
    @keyframes text-glow-pulse {
      0%, 100% { text-shadow: 0 0 10px rgba(216,180,254,0.4); }
      50% { text-shadow: 0 0 30px rgba(216,180,254,1), 0 0 40px rgba(168,85,247,0.8); }
    }
    .animate-text-glow {
      animation: text-glow-pulse 4s ease-in-out infinite;
    }

    /* 结尾深空星云与流星特效 */
    @keyframes nebula-drift-1 {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      33% { transform: translate(3vw, -4vh) scale(1.1) rotate(5deg); }
      66% { transform: translate(-2vw, 3vh) scale(0.95) rotate(-3deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    @keyframes nebula-drift-2 {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      33% { transform: translate(-4vw, 5vh) scale(1.05) rotate(-5deg); }
      66% { transform: translate(3vw, -3vh) scale(0.9) rotate(2deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    @keyframes shooting-star {
      0% { transform: rotate(135deg) translateX(0); opacity: 1; width: 0; }
      5% { opacity: 1; width: 180px; }
      15% { opacity: 0; transform: rotate(135deg) translateX(1200px); width: 0; }
      100% { opacity: 0; }
    }
    .shooting-star-wrapper {
      position: absolute;
      width: 0;
      height: 2px;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(168,85,247,0.6) 50%, rgba(255,255,255,1) 100%);
      animation: shooting-star 6s linear infinite;
      box-shadow: 0 0 10px rgba(168,85,247,0.3);
    }
    .shooting-star-wrapper::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 12px 3px rgba(255,255,255,0.9), 0 0 20px 4px rgba(168,85,247,0.6);
    }

    /* 多重宇宙回声渐现动画 */
    @keyframes echo-appear {
      0% { opacity: 0; filter: blur(8px); transform: translateY(20px) scale(0.9); }
      100% { opacity: 0.85; filter: blur(0px); transform: translateY(0) scale(1); }
    }
    .animate-echo {
      animation: echo-appear 2s ease-out forwards;
      opacity: 0; /* 初始隐藏 */
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 内置 SVG 图标组件 ---
    const IconWrapper = ({ children, className = "", style = {} }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>
        {children}
      </svg>
    );

    // 基础图标
    const Rocket = (props) => <IconWrapper {...props}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></IconWrapper>;
    const AlertTriangle = (props) => <IconWrapper {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></IconWrapper>;
    const Wrench = (props) => <IconWrapper {...props}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></IconWrapper>;
    const Globe = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></IconWrapper>;
    const Users = (props) => <IconWrapper {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
    const Headset = (props) => <IconWrapper {...props}><path d="M3 11h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-5Zm0 0a9 9 0 1 1 18 0m0 0v5a2 2 0 0 1-2 2h-1a2 2 0 0 1 2-2h3Z"/><path d="M21 16v2a4 4 0 0 1-4 4h-5"/></IconWrapper>;
    const Mountain = (props) => <IconWrapper {...props}><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></IconWrapper>;
    const Cpu = (props) => <IconWrapper {...props}><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></IconWrapper>;
    const CloudLightning = (props) => <IconWrapper {...props}><path d="M6 16.326A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 .5 8.973"/><path d="m13 12-3 5h4l-3 5"/></IconWrapper>;
    const ChevronRight = (props) => <IconWrapper {...props}><path d="m9 18 6-6-6-6"/></IconWrapper>;
    const ChevronLeft = (props) => <IconWrapper {...props}><path d="m15 18-6-6 6-6"/></IconWrapper>;
    const Crosshair = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M2 12h2"/><path d="M20 12h2"/></IconWrapper>;
    const Activity = (props) => <IconWrapper {...props}><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0L8.76 10.54a2 2 0 0 1-1.93 1.46H2"/></IconWrapper>;
    const Database = (props) => <IconWrapper {...props}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></IconWrapper>;
    const Pickaxe = (props) => <IconWrapper {...props}><path d="M14.531 12.469 6.619 20.38a1 1 0 1 1-3-3l7.912-7.912"/><path d="M15.686 4.314A12.5 12.5 0 0 0 5.461 2.958 1 1 0 0 0 5.58 4.71a22 22 0 0 1 6.318 3.393"/><path d="M17.7 3.7a1 1 0 0 0-1.4 0l-4.6 4.6a1 1 0 0 0 0 1.4l2.6 2.6a1 1 0 0 0 1.4 0l4.6-4.6a1 1 0 0 0 0-1.4z"/><path d="M19.686 8.314a12.501 12.501 0 0 1 1.356 10.225 1 1 0 0 1-1.752-.119 22 22 0 0 0-3.393-6.319"/></IconWrapper>;
    const Search = (props) => <IconWrapper {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconWrapper>;
    const Swords = (props) => <IconWrapper {...props}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" x2="19" y1="19" y2="13"/><line x1="16" x2="20" y1="16" y2="20"/><line x1="19" x2="21" y1="21" y2="19"/><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"/><line x1="5" x2="9" y1="14" y2="18"/><line x1="7" x2="4" y1="17" y2="20"/><line x1="3" x2="5" y1="19" y2="21"/></IconWrapper>;
    const Coins = (props) => <IconWrapper {...props}><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></IconWrapper>;
    const Terminal = (props) => <IconWrapper {...props}><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></IconWrapper>;
    const Binary = (props) => <IconWrapper {...props}><rect x="14" y="14" width="4" height="6" rx="2"/><rect x="6" y="4" width="4" height="6" rx="2"/><path d="M6 20h4"/><path d="M14 10h4"/><path d="M6 14h2v6"/><path d="M14 4h2v6"/></IconWrapper>;
    const Hash = (props) => <IconWrapper {...props}><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></IconWrapper>;
    const Key = (props) => <IconWrapper {...props}><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></IconWrapper>;
    const Compass = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></IconWrapper>;
    const Settings = (props) => <IconWrapper {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1-1-1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
    const InfinityIcon = (props) => <IconWrapper {...props}><path d="M12 12c-2-2.67-4-4-6-4a4 4 0 1 0 0 8c2 0 4-1.33 6-4Zm0 0c2 2.67 4 4 6 4a4 4 0 0 0 0-8c-2 0-4 1.33-6 4Z"/></IconWrapper>;
    const Eye = (props) => <IconWrapper {...props}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
    const RadioSignal = (props) => <IconWrapper {...props}><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.2 19.1 19.1"/></IconWrapper>;
    const Sparkles = (props) => <IconWrapper {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
    const User = (props) => <IconWrapper {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;
    const RefreshCw = (props) => <IconWrapper {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconWrapper>;
    const MessageSquare = (props) => <IconWrapper {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></IconWrapper>;

    // --- 游戏历程数据 ---
    const milestones = [
      { id: 1, date: '2016.08', name: '发售初版 / Launch', desc: '充满争议的起点。宇宙浩瀚却略显空洞，遭遇史诗级的口碑滑铁卢。但开发团队选择了沉默并开始埋头苦干。', icon: AlertTriangle, color: 'text-red-500', bgColor: 'bg-red-500', borderColor: 'border-red-500', status: 'SYSTEM WARNING' },
      { id: 2, date: '2016.11', name: '基础 / Foundation', desc: '救赎之路开启。游戏引入了基础的基地建设系统、可购买的大型货船，以及更具挑战性的生存和永久死亡模式。', icon: Wrench, color: 'text-orange-400', bgColor: 'bg-orange-400', borderColor: 'border-orange-400', status: 'REBUILDING' },
      { id: 3, date: '2017.08', name: '崛起 / Atlas Rises', desc: '补全了世界观，引入长达30小时的完整故事主线。加入了星际传送门、坠毁货船，并首次实现了玩家间的“光球”可见联机。', icon: Globe, color: 'text-yellow-400', bgColor: 'bg-yellow-400', borderColor: 'border-yellow-400', status: 'EXPANDING' },
      { id: 4, date: '2018.07', name: 'NEXT', desc: '真正的分水岭！带来全面的多人联机模式、第三人称视角、画质全面升级以及舰队指挥系统。口碑彻底逆转，重获新生。', icon: Users, color: 'text-green-400', bgColor: 'bg-green-400', borderColor: 'border-green-400', status: 'OPTIMAL' },
      { id: 5, date: '2019.08', name: '超越 / Beyond', desc: '引入完整的VR虚拟现实支持，将沉浸感提升到新高度。大幅扩展了多人社交枢纽“太空异象”，最高支持32人同屏。', icon: Headset, color: 'text-pink-400', bgColor: 'bg-pink-400', borderColor: 'border-pink-400', status: 'IMMERSIVE' },
      { id: 6, date: '2020.09', name: '起源 / Origins', desc: '宇宙多样性大爆发。加入了数百万个新星球、高耸的山脉、活火山、巨型沙虫以及龙卷风等极端动态天气系统。', icon: Mountain, color: 'text-teal-400', bgColor: 'bg-teal-400', borderColor: 'border-teal-400', status: 'DIVERSE' },
      { id: 7, date: '2023.08', name: '回声 / Echoes', desc: '全新的隐藏机器种族“自噬体”登场。引入了史诗级的太空无畏舰战役、定制化机械法杖武器以及披风等外观系统。', icon: Cpu, color: 'text-cyan-400', bgColor: 'bg-cyan-400', borderColor: 'border-cyan-400', status: 'EVOLVED' },
      { id: 8, date: '2024.07', name: '世界 Pt.1 / Worlds', desc: '游戏底层引擎的革命性重制。带来极其逼真的动态水体和海浪、体积云、全新的大气系统以及丰富的全新动植物群落。', icon: CloudLightning, color: 'text-indigo-400', bgColor: 'bg-indigo-400', borderColor: 'border-indigo-400', status: 'REVOLUTIONARY' }
    ];

    // --- 动态星空背景组件 ---
    const Starfield = ({ density = 50, dark = false, transparentBackground = false }) => {
      const [stars] = useState(() => [...Array(density)].map(() => ({
        top: `${Math.random() * 100}%`,
        left: `${Math.random() * 100}%`,
        width: `${Math.random() * 3 + 1}px`,
        height: `${Math.random() * 3 + 1}px`,
        opacity: Math.random() * 0.8 + 0.2,
        animationDuration: `${Math.random() * 3 + 2}s`
      })));

      return (
        <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
          {!transparentBackground && (
            <div className={`absolute inset-0 ${dark ? 'bg-black/90' : 'bg-slate-950/50 mix-blend-multiply'}`}></div>
          )}
          {stars.map((style, i) => (
            <div key={i} className={`absolute rounded-full animate-pulse ${dark ? 'bg-cyan-100/50' : 'bg-white'}`} style={style} />
          ))}
        </div>
      );
    };

    // --- 专属深空星云与流星特效背景 ---
    const NebulaBackground = () => {
      const [shootingStars] = useState(() => Array.from({ length: 8 }).map(() => ({
        top: `${Math.random() * 30}%`, 
        left: `${Math.random() * 60 + 40}%`, 
        delay: `${Math.random() * 10}s`,
        duration: `${Math.random() * 2 + 4}s`
      })));

      return (
        <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
          <div className="absolute inset-0 bg-[#02040a]"></div>
          <div className="absolute top-[-20%] left-[-10%] w-[70%] h-[70%] rounded-full opacity-50 filter blur-[100px] mix-blend-screen" 
               style={{ background: 'radial-gradient(circle, rgba(147,51,234,0.35) 0%, rgba(0,0,0,0) 70%)', animation: 'nebula-drift-1 25s infinite ease-in-out' }}></div>
          <div className="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] rounded-full opacity-40 filter blur-[120px] mix-blend-screen" 
               style={{ background: 'radial-gradient(circle, rgba(6,182,212,0.25) 0%, rgba(59,130,246,0.2) 40%, rgba(0,0,0,0) 70%)', animation: 'nebula-drift-2 30s infinite ease-in-out reverse' }}></div>
          <div className="absolute top-[20%] left-[30%] w-[50%] h-[50%] rounded-full opacity-30 filter blur-[90px] mix-blend-screen" 
               style={{ background: 'radial-gradient(circle, rgba(76,29,149,0.4) 0%, rgba(0,0,0,0) 70%)', animation: 'nebula-drift-1 35s infinite ease-in-out 5s' }}></div>

          <Starfield density={100} dark={true} transparentBackground={true} />

          {shootingStars.map((star, i) => (
            <div key={i} className="shooting-star-wrapper" style={{
              top: star.top, left: star.left, animationDelay: star.delay, animationDuration: star.duration
            }}></div>
          ))}
        </div>
      );
    };

    // --- 全局曲速跃迁过场组件 (Warp Drive) ---
    const WarpOverlay = ({ warpState }) => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let stars = [];
        const numStars = 600;
        let speed = 0;
        let animationId;

        for (let i = 0; i < numStars; i++) {
          stars.push({
            x: (Math.random() - 0.5) * width * 2,
            y: (Math.random() - 0.5) * height * 2,
            z: Math.random() * width,
            pz: Math.random() * width,
            color: Math.random() > 0.6 ? '#ffffff' : (Math.random() > 0.4 ? '#22d3ee' : '#c084fc')
          });
        }

        const render = () => {
          ctx.fillStyle = `rgba(2, 4, 10, ${warpState === 'warping_out' ? 0.3 : 0.5})`;
          ctx.fillRect(0, 0, width, height);

          const targetSpeed = warpState === 'warping_in' ? 120 : (warpState === 'warping_out' ? 2 : 0.5);
          speed += (targetSpeed - speed) * 0.08;

          ctx.translate(width / 2, height / 2);

          stars.forEach(star => {
            star.pz = star.z;
            star.z -= speed;

            if (star.z < 1) {
              star.z = width;
              star.pz = width;
              star.x = (Math.random() - 0.5) * width * 2;
              star.y = (Math.random() - 0.5) * height * 2;
            }

            const sx = star.x / star.z * (width / 2);
            const sy = star.y / star.z * (height / 2);
            const px = star.x / star.pz * (width / 2);
            const py = star.y / star.pz * (height / 2);

            const opacity = Math.min(1, (width - star.z) / (width * 0.5));

            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(sx, sy);
            ctx.lineWidth = Math.max(0.5, (1 - star.z / width) * 4);
            ctx.strokeStyle = star.color;
            ctx.globalAlpha = opacity;
            
            if (speed > 50) {
              ctx.shadowBlur = 10;
              ctx.shadowColor = star.color;
            } else {
              ctx.shadowBlur = 0;
            }
            
            ctx.stroke();
          });

          ctx.translate(-width / 2, -height / 2);
          ctx.globalAlpha = 1;

          if (warpState === 'warping_in') {
             const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width/3);
             gradient.addColorStop(0, `rgba(255,255,255, ${speed/150})`);
             gradient.addColorStop(0.2, `rgba(34,211,238, ${speed/200})`);
             gradient.addColorStop(1, 'transparent');
             ctx.fillStyle = gradient;
             ctx.globalCompositeOperation = 'screen';
             ctx.fillRect(0, 0, width, height);
             ctx.globalCompositeOperation = 'source-over';
          }

          animationId = requestAnimationFrame(render);
        };

        const handleResize = () => {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', handleResize);
        render();

        return () => {
          window.removeEventListener('resize', handleResize);
          cancelAnimationFrame(animationId);
        };
      }, [warpState]);

      return (
        <div className={`fixed inset-0 z-[100] pointer-events-none transition-opacity duration-700 ease-in-out ${warpState !== 'idle' ? 'opacity-100' : 'opacity-0'}`}>
          <canvas ref={canvasRef} className="w-full h-full bg-[#02040a]" />
        </div>
      );
    };

    // --- 核心：代码转星球的 Canvas 粒子系统 (Intro使用) ---
    const CanvasUniverse = ({ step, warpTarget }) => {
      const canvasRef = useRef(null);
      const stepRef = useRef(step);
      const warpTargetRef = useRef(warpTarget);
      
      useEffect(() => { stepRef.current = step; }, [step]);
      useEffect(() => { warpTargetRef.current = warpTarget; }, [warpTarget]);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d', { alpha: false });
        let animationFrameId;
        let particles = [];
        const chars = '01#@$%&*!?ABCDEFGHIJKLMNOPQRSTUVWXYZΣ∫π∞∆∇μλ';
        const planetColors = ['#22d3ee', '#d946ef', '#6366f1', '#fef08a', '#ffffff', '#38bdf8', '#fb7185'];

        const initParticles = () => {
          particles = [];
          const spacing = 22; 
          const cols = Math.ceil(window.innerWidth / spacing);
          const rows = Math.ceil(window.innerHeight / spacing);
          const total = cols * rows;

          for (let i = 0; i < total; i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const isPlanet = Math.random() < 0.08; 
            const targetSize = isPlanet ? Math.random() * 3 + 2 : Math.random() * 1.5 + 0.2;
            
            particles.push({
              x: col * spacing + spacing / 2,
              y: row * spacing + spacing / 2,
              planetX: Math.random() * window.innerWidth,
              planetY: Math.random() * window.innerHeight,
              size: 0,
              targetSize: targetSize,
              char: chars[Math.floor(Math.random() * chars.length)],
              color: isPlanet ? planetColors[Math.floor(Math.random() * planetColors.length)] : '#cbd5e1',
              delay: Math.random() * 80, 
              state: 'code' 
            });
          }
        };

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          if (stepRef.current === 0) initParticles();
        };
        window.addEventListener('resize', resize);
        resize();

        let frame = 0;
        let prevStep = stepRef.current;

        const render = () => {
          frame++;
          const currentStep = stepRef.current;

          if (currentStep !== prevStep) {
            if (currentStep > 0 && prevStep > 0 && currentStep < 5) {
              particles.forEach(p => {
                p.planetX = Math.random() * canvas.width;
                p.planetY = Math.random() * canvas.height;
                if (currentStep === 2 && Math.random() < 0.3) p.color = '#ef4444'; 
                else if (currentStep === 3 && Math.random() < 0.4) p.color = '#22d3ee';
                else if (currentStep === 4 && Math.random() < 0.1) p.color = '#ffffff';
                p.state = 'morphing';
                p.delay = 0;
              });
            } else if (currentStep === 5 && warpTargetRef.current) {
               particles.forEach(p => {
                 p.state = 'warping';
                 p.r = Math.sqrt((p.x - warpTargetRef.current.x)**2 + (p.y - warpTargetRef.current.y)**2);
                 p.angle = Math.atan2(p.y - warpTargetRef.current.y, p.x - warpTargetRef.current.x);
                 p.size = Math.min(p.size || 1.5, 2.5);
               });
            }
            prevStep = currentStep;
          }

          if (currentStep === 0) {
            ctx.fillStyle = 'rgba(5, 10, 15, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
          } else if (currentStep === 5) {
            ctx.fillStyle = 'rgba(15, 23, 42, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
          } else {
            const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
            gradient.addColorStop(0, 'rgba(15, 23, 42, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
          }

          particles.forEach(p => {
            if (currentStep === 0) {
              if (frame % 8 === 0 && Math.random() < 0.05) p.char = chars[Math.floor(Math.random() * chars.length)];
              const glitchOffset = Math.random() < 0.01 ? (Math.random() - 0.5) * 8 : 0;
              ctx.fillStyle = Math.random() < 0.05 ? '#a7f3d0' : '#06b6d4'; 
              ctx.font = '14px monospace';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(p.char, p.x + glitchOffset, p.y);
            } else {
              if (p.state === 'code') {
                if (p.delay > 0) {
                  p.delay--;
                  ctx.fillStyle = '#06b6d4';
                  ctx.font = '14px monospace';
                  ctx.fillText(p.char, p.x, p.y);
                  return;
                } else p.state = 'morphing';
              }

              if (p.state === 'morphing' || p.state === 'planet') {
                const dx = p.planetX - p.x;
                const dy = p.planetY - p.y;
                p.x += dx * 0.04;
                p.y += dy * 0.04;
                p.size += (p.targetSize - p.size) * 0.05;

                if (Math.abs(dx) < 1 && Math.abs(dy) < 1) {
                  p.state = 'planet';
                  p.planetX += (Math.random() - 0.5) * 0.8;
                  p.planetY += (Math.random() - 0.5) * 0.8;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                if (p.targetSize > 2) {
                  ctx.shadowBlur = p.size * 3;
                  ctx.shadowColor = p.color;
                }
                ctx.fill();
                ctx.shadowBlur = 0; 
              } else if (p.state === 'warping' && warpTargetRef.current) {
                const tx = warpTargetRef.current.x;
                const ty = warpTargetRef.current.y;
                const speed = 0.02 + 15 / (p.r + 50); 
                p.angle += speed;
                p.r *= 0.94;
                p.x = tx + p.r * Math.cos(p.angle);
                p.y = ty + p.r * Math.sin(p.angle);
                
                if (p.r > 2) {
                  ctx.beginPath();
                  ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                  const alpha = Math.min(0.6, p.r / 100);
                  ctx.fillStyle = `rgba(6, 182, 212, ${alpha})`; 
                  ctx.fill();
                }
              }
            }
          });

          animationFrameId = requestAnimationFrame(render);
        };
        render();

        return () => {
          window.removeEventListener('resize', resize);
          cancelAnimationFrame(animationFrameId);
        };
      }, []);

      return <canvas ref={canvasRef} className="absolute inset-0 z-0 pointer-events-none" />;
    };

          mouseRef.current.targetX = (e.clientX / window.innerWidth) * 2 - 1;
          mouseRef.current.targetY = (e.clientY / window.innerHeight) * 2 - 1;
        };
        
        window.addEventListener('mousemove', handleMouseMove);

        let animationId;
        const animate = () => {
          const m = mouseRef.current;
          // Lerp 平滑插值计算（阻尼感），0.03 的系数带来极其平滑的“太空漂浮”手感
          m.x += (m.targetX - m.x) * 0.03;
          m.y += (m.targetY - m.y) * 0.03;

          // 核心 3D 透视场景（深空背景与巨物）- 提供主要的方向感偏转
          if (sceneRef.current) {
            sceneRef.current.style.transform = `perspective(800px) rotateX(${m.y * -12}deg) rotateY(${m.x * 18}deg)`;
          }
          
          // HUD 准星与物理边框遮罩（反向位移，模拟镜框与眼球的相对运动）
          if (hudRef.current) {
            hudRef.current.style.transform = `translate(${m.x * -20}px, ${m.y * -20}px)`;
          }
          
          // 交互面板（更贴近屏幕，小幅度平移）
          if (uiRef.current) {
            uiRef.current.style.transform = `translate(${m.x * -10}px, ${m.y * -10}px)`;
          }

          animationId = requestAnimationFrame(animate);
        };
        
        animate();

        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          cancelAnimationFrame(animationId);
        };
      }, [step]);

              ref={sceneRef}

              style={{ transformStyle: 'preserve-3d' }}
            >
              {/* 极远景：深邃星空 (Z轴深度推至远方) */}

                  </p>
                  <p className="text-slate-300 text-lg md:text-2xl animate-fadeIn" style={{ animationDelay: '1.5s', animationFillMode: 'both' }}>
                    但它现在还在等待，等待着被真正唤醒。<br/>
                    <span className="text-white mt-4 block font-medium drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">我们不仅要用代码构建世界，更要用技术去点燃这个宇宙的灵魂。</span>
                  </p>
                  <div className="relative py-8 animate-fadeIn" style={{ animationDelay: '3s', animationFillMode: 'both' }}>
                     <div className="absolute inset-x-10 top-0 h-px bg-gradient-to-r from-transparent via-cyan-500/50 to-transparent"></div>
                     <p className="text-cyan-300 font-medium italic drop-shadow-[0_0_15px_rgba(34,211,238,0.5)] animate-text-glow text-2xl md:text-4xl leading-relaxed">
                       “愿我们都能在这广袤孤独的代码宇宙中，<br/>用我们的体验，去赋予每一颗星、每一次相遇独特的意义。”
                     </p>
                     <div className="absolute inset-x-10 bottom-0 h-px bg-gradient-to-r from-transparent via-cyan-500/50 to-transparent"></div>
                  </div>
                </div>

                <div className="mt-20 flex flex-col items-center animate-fadeIn" style={{ animationDelay: '5s', animationFillMode: 'both' }}>
                  <p className="text-purple-400 font-mono tracking-[0.4em] text-sm uppercase flex items-center gap-2 drop-shadow-sm mb-6">
                    <Sparkles className="w-4 h-4 animate-pulse" /> Presentation Complete <Sparkles className="w-4 h-4 animate-pulse" />
                  </p>
                  
                  {/* 新增的动作按钮区：包含了重启与日志总结 */}
                  <div className="flex flex-col sm:flex-row items-center gap-6 mt-4">
                    <button onClick={() => window.location.reload()} className="group flex items-center gap-3 text-slate-400 hover:text-cyan-400 transition-all duration-300 pointer-events-auto bg-slate-900/60 px-6 py-3 rounded-full border border-slate-700/80 hover:border-cyan-500 backdrop-blur-md shadow-lg">
                      <RefreshCw className="w-4 h-4 group-hover:-rotate-180 transition-transform duration-700" />
                      <span className="text-xs tracking-[0.3em] uppercase">重启宇宙循环</span>
                    </button>

                    <button onClick={() => setShowSummary(true)} className="group flex items-center gap-3 text-slate-400 hover:text-purple-400 transition-all duration-300 pointer-events-auto bg-slate-900/60 px-6 py-3 rounded-full border border-slate-700/80 hover:border-purple-500 backdrop-blur-md shadow-lg">
                      <Database className="w-4 h-4 group-hover:animate-pulse" />
                      <span className="text-xs tracking-[0.3em] uppercase">提取核心日志</span>
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- 根组件 (路由与全局跃迁控制) ---
    function App() {
      // 状态：intro (开场) -> chronicle (编年史) -> pcg (底层真理) -> vr -> outro (哲思结尾)
      const [currentSection, setCurrentSection] = useState('intro'); 
      const [warpState, setWarpState] = useState('idle'); // 'idle' | 'warping_in' | 'warping_out'

      // 全局路由导航控制：附带曲速跃迁过场效果
      const handleNavigate = (nextSection) => {
        if (warpState !== 'idle') return;
        
        // 1. 启动跃迁拉扯特效
        setWarpState('warping_in');
        
        // 2. 1.2秒后达到跃迁极速，在此黑屏瞬间切换组件
        setTimeout(() => {
          setCurrentSection(nextSection);
          
          // 3. 切换为减速飞出状态
          setWarpState('warping_out');
          
          // 4. 0.8秒后完全淡出跃迁特效，恢复正常 UI
          setTimeout(() => {
            setWarpState('idle');
          }, 800); 
        }, 1200); 
      };

      // --- 全局快捷键：监听 F 键切换全屏 ---
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.target.tagName.toLowerCase() === 'input') return;
          if (e.key === 'f' || e.key === 'F') {
            e.preventDefault();
            if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen().catch(err => {
                console.log(`全屏模式请求失败: ${err.message}`);
              });
            } else {
              if (document.exitFullscreen) {
                document.exitFullscreen();
              }
            }
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, []);

      return (
        <React.Fragment>
          {/* 全局曲速跃迁视觉层 (Z-index 最高) */}
          <WarpOverlay warpState={warpState} />

          {/* 各大核心板块，使用 handleNavigate 来替换原本的 setCurrentSection，实现无缝跃迁 */}
          {currentSection === 'intro' && <IntroScreen onComplete={() => handleNavigate('chronicle')} />}
          
          {currentSection === 'chronicle' && <MainApp onEnterPCG={() => handleNavigate('pcg')} />}
          
          {currentSection === 'pcg' && <PCGSection onBack={() => handleNavigate('chronicle')} onNext={() => handleNavigate('vr')} />}
          
          {currentSection === 'vr' && <VRSection onNext={() => handleNavigate('outro')} />}
          
          {currentSection === 'outro' && <OutroSection />}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
